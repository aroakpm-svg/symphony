name: node-enrollment-postgres

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/scripts/test-node-enrollment.sh"
      - ".github/workflows/node-enrollment-postgres.yml"
      - "elixir/priv/symphony_migrations/**"

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: disposable
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify node enrollment lifecycle
        env:
          PGPASSWORD: disposable
          TEST_DATABASE_URL: postgresql://postgres@localhost:5432/postgres
        run: bash .github/scripts/test-node-enrollment.sh
