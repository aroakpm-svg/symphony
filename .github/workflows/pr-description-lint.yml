name: pr-description-lint

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number whose actual body and head will be validated
        required: true
        type: string
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up mise tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Validate PR description format
        env:
          EXPECTED_HEAD: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
          PR_BODY_JSON: ${{ toJson(github.event.pull_request.body) }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pr_json=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER")
            actual_head=$(printf '%s' "$pr_json" | jq -r '.head.sha')
            if [ "$actual_head" != "$EXPECTED_HEAD" ]; then
              echo "PR #$PR_NUMBER head $actual_head does not match workflow head $EXPECTED_HEAD" >&2
              exit 1
            fi
            printf '%s' "$pr_json" | jq -r '.body // ""' > /tmp/pr_body.md
          else
            printf '%s' "$PR_BODY_JSON" | jq -r '.' > /tmp/pr_body.md
          fi

          mix pr_body.check --file /tmp/pr_body.md
